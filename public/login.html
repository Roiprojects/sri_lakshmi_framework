<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Lakshmi Frameworks</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0B1B36 0%, #1a3258 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .login-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-glass h1 {
            margin: 0 0 10px;
            font-weight: 600;
            font-size: 2rem;
            background: linear-gradient(to right, #D4AF37, #f3e5ab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-glass p {
            color: #ccc;
            margin-bottom: 30px;
            font-weight: 300;
        }
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }
        .input-group input {
            width: 100%;
            padding: 15px 45px 15px 45px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .toggle-eye {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            font-size: 1rem;
            line-height: 1;
            transition: color 0.2s;
        }
        .toggle-eye:hover {
            color: #D4AF37;
        }
        .input-group input:focus {
            border-color: #D4AF37;
            background: rgba(0,0,0,0.4);
        }
        .btn-login {
            background: #D4AF37;
            color: #0B1B36;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #f3e5ab;
            transform: translateY(-2px);
        }
        .error {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-glass">
        <h1>Admin Portal</h1>
        <p>Secure Access to Lakshmi Frameworks</p>
        
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="userId" placeholder="Enter User ID" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Secure Passcode" required>
                <button type="button" class="toggle-eye" id="togglePassword" aria-label="Show password">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Authenticate <i class="fas fa-arrow-right" style="margin-left: 5px;"></i></button>
            <div class="error" id="errorMsg"><i class="fas fa-exclamation-circle"></i> Invalid Credentials</div>
        </form>
    </div>

    <script src="config.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('adminToken')) {
            window.location.href = window.APP_CONFIG.getPageUrl('admin');
        }

        // Show / hide password toggle
        document.getElementById('togglePassword').addEventListener('click', function () {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
                this.setAttribute('aria-label', 'Hide password');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
                this.setAttribute('aria-label', 'Show password');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            errorMsg.style.display = 'none';
            
            // Hardcoded authentication as requested
            if (userId === "Sl frame" && password === "JACK@-9988") {
                // Simulate a small delay for premium feel
                setTimeout(() => {
                    localStorage.setItem('adminToken', 'sl-frame-secure-session');
                    window.location.href = window.APP_CONFIG.getPageUrl('admin');
                }, 800);
                return;
            }

            // Fallback for other potential credentials or server-side sync
            try {
                const res = await fetch(window.APP_CONFIG.getApiUrl('/api/login'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, password })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    if (data.success) {
                        localStorage.setItem('adminToken', data.token);
                        window.location.href = window.APP_CONFIG.getPageUrl('admin');
                        return;
                    }
                }
                
                errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid User ID or Passcode';
                errorMsg.style.display = 'block';
                btn.innerHTML = 'Authenticate <i class="fas fa-arrow-right"></i>';
                
            } catch (err) {
                // If no server is running and hardcoded check failed
                errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid User ID or Passcode';
                errorMsg.style.display = 'block';
                btn.innerHTML = 'Authenticate <i class="fas fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
